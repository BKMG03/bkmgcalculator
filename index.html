<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKMG Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>BKMG Calculator</h1>
    <p>Universal ULIP Calculator</p>
</header>

<div class="container">

    <div class="card">

        <h2>Universal ULIP Calculator</h2>

        <label>Customer Name</label>
        <input type="text" id="name" placeholder="Enter Name">

        <label>Annual Premium (₹)</label>
        <input type="number" id="premium" placeholder="50000">

        <label>Premium Paying Term (Years)</label>
        <input type="number" id="ppt" placeholder="10">

        <label>Policy Term (Years)</label>
        <input type="number" id="term" placeholder="20">

        <label>Expected Return (%)</label>

        <select id="rate">
            <option>4</option>
            <option selected>8</option>
            <option>10</option>
            <option>12</option>
        </select>

        <button onclick="calculateULIP()">Calculate</button>

    </div>

    <div class="card">

        <h2>Results</h2>

        <h3>Total Premium</h3>
        <p id="premiumResult">₹0</p>

        <h3>Estimated Fund Value</h3>
        <p id="fundResult">₹0</p>

        <h3>Wealth Gain</h3>
        <p id="gainResult">₹0</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
